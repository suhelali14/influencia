        - name: end_date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Creator analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatorAnalytics'

  /analytics/campaigns/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get campaign analytics
      security:
        - BearerAuth: []
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Campaign analytics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CampaignAnalytics'

  # ===== Webhooks (for receiving platform events) =====
  /webhooks/social/{platform}:
    post:
      tags: [Social Connect]
      summary: Receive social platform webhooks
      description: Endpoint for Instagram/YouTube/TikTok to push real-time updates
      parameters:
        - name: platform
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed

  /webhooks/payments:
    post:
      tags: [Payments]
      summary: Receive payment provider webhooks
      description: Razorpay/Stripe webhook endpoint
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Webhook processed

security:
  - BearerAuth: []
