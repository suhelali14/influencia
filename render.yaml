# Render Blueprint — One-Click Deploy for Influencia Platform
# Usage: Push to GitHub, then go to https://dashboard.render.com/blueprints
# Docs: https://render.com/docs/blueprint-spec

services:
  # ─────────────────────────────────────────────────────────
  # 1. Backend — NestJS API (Docker, Free Tier)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: influencia-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000

      # Database — Neon PostgreSQL (individual vars used by TypeORM)
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_SSL
        value: "true"

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 7d

      # Redis — Render Free Key Value
      - key: REDIS_HOST
        fromService:
          name: influencia-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: influencia-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: influencia-redis
          type: redis
          property: password
      - key: REDIS_USERNAME
        value: ""
      - key: REDIS_TLS
        value: "true"

      # AI Service — internal URL
      - key: AI_SERVICE_URL
        fromService:
          name: influencia-ai
          type: web
          property: hostport
      - key: ML_API_URL
        fromService:
          name: influencia-ai
          type: web
          property: hostport

      # Session
      - key: SESSION_TTL
        value: "604800"
      - key: MAX_SESSIONS_PER_USER
        value: "5"

      # CORS — allow frontend origin
      - key: CORS_ORIGIN
        value: "*"

      # Frontend URL
      - key: FRONTEND_URL
        fromService:
          name: influencia-frontend
          type: web
          property: url

  # ─────────────────────────────────────────────────────────
  # 2. Frontend — React + Vite (Docker/Nginx, Free Tier)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: influencia-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      # Build-time: Vite bakes these into the JS bundle
      # ⚠️ Set AFTER backend + AI deploy, then trigger manual redeploy
      - key: VITE_API_URL
        sync: false  # set to: https://influencia-backend.onrender.com/v1
      - key: VITE_AI_API_URL
        sync: false  # set to: https://influencia-ai.onrender.com

  # ─────────────────────────────────────────────────────────
  # 3. AI/ML Service — Python Flask + ML Models (Free Tier)
  # ─────────────────────────────────────────────────────────
  - type: web
    name: influencia-ai
    runtime: docker
    dockerfilePath: ./ai/Dockerfile
    dockerContext: ./ai
    plan: free
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "5001"
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_LLM
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: "*"

  # ─────────────────────────────────────────────────────────
  # 4. Redis — Session & Cache Store (Free Tier)
  # ─────────────────────────────────────────────────────────
  - type: redis
    name: influencia-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []  # allow all
