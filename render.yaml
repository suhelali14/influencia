# Render Blueprint — Influencia Platform
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: Do NOT combine rootDir with dockerContext —
# rootDir shifts the CWD, then dockerContext is applied relative to it,
# causing double-path errors (e.g. backend/backend).
# We use only dockerfilePath + dockerContext, both relative to repo root.

services:
  # ─────────────────────────────────────────────
  # 1. Backend — NestJS API
  # ─────────────────────────────────────────────
  - type: web
    name: influencia-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /v1/health
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      # Neon PostgreSQL
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        value: "5432"
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_SSL
        value: "true"
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "7d"
      # Redis Cloud
      - key: REDIS_HOST
        value: "redis-12525.c74.us-east-1-4.ec2.cloud.redislabs.com"
      - key: REDIS_PORT
        value: "12525"
      - key: REDIS_PASSWORD
        value: "WNw2ECiGTMY2u64cEnx16X4FkflW4QVn"
      - key: REDIS_USERNAME
        value: "default"
      - key: REDIS_TLS
        value: "false"
      # AI Service URL (set after AI deploys)
      - key: AI_SERVICE_URL
        sync: false
      - key: ML_API_URL
        sync: false
      # Session
      - key: SESSION_TTL
        value: "604800"
      - key: MAX_SESSIONS_PER_USER
        value: "5"
      # CORS
      - key: CORS_ORIGIN
        value: "*"
      # Frontend URL (set after frontend deploys)
      - key: FRONTEND_URL
        sync: false

  # ─────────────────────────────────────────────
  # 2. Frontend — React + Vite + Nginx
  # ─────────────────────────────────────────────
  - type: web
    name: influencia-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    region: oregon
    healthCheckPath: /health
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: PORT
        value: "10000"
      # Build-time: Vite bakes these into JS bundle
      # Set AFTER backend + AI deploy, then trigger manual redeploy
      - key: VITE_API_URL
        sync: false
      - key: VITE_AI_API_URL
        sync: false

  # ─────────────────────────────────────────────
  # 3. AI/ML Service — Flask + PyTorch
  # ─────────────────────────────────────────────
  - type: web
    name: influencia-ai
    runtime: docker
    dockerfilePath: ./ai/Dockerfile
    dockerContext: ./ai
    plan: free
    region: oregon
    healthCheckPath: /health
    buildFilter:
      paths:
        - ai/**
    envVars:
      - key: PORT
        value: "5001"
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_LLM
        value: "true"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: CORS_ORIGINS
        value: "*"
